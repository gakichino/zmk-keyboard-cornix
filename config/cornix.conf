# Layer RGB colors (zmk-rgbled-widget)
# 0=black 1=red 2=green 3=yellow 4=blue 5=magenta 6=cyan 7=white
#
# Layer index matches cornix.keymap order:
#   0 default_layer   off
#   1 Mac_func_layer  blue
#   2 win_layer       off
#   3 win_func_layer  red
#   4 Symbol_layer    yellow
#   5 Navi_layer      green
#   6 Adjust_layer    white

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=7
